<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DomQ — Поиск квартир</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #2563EB;
      --primary-light: #EFF6FF;
      --hot: #EF4444;
      --hot-light: #FEF2F2;
      --success: #16A34A;
      --surface: #F8FAFC;
      --border: #E2E8F0;
      --text: #0F172A;
      --muted: #64748B;
      --radius: 12px;
    }

    body { background: var(--surface); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }

    /* ── Navbar ── */
    .navbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 60px;
    }
    .navbar-brand { font-weight: 800; font-size: 1.35rem; color: var(--primary) !important; letter-spacing: -0.5px; }
    .navbar-brand span { color: var(--text); }
    .nav-link { color: var(--muted) !important; font-weight: 500; font-size: 0.9rem; padding: 0.4rem 0.75rem !important; border-radius: 6px; }
    .nav-link:hover, .nav-link.active { background: var(--primary-light); color: var(--primary) !important; }
    .last-update { font-size: 0.75rem; color: var(--muted); background: var(--surface); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

    /* ── Filters ── */
    .filters-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
    }
    .filter-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

    .room-chips { display: flex; gap: 6px; }
    .room-chip {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--border); border-radius: 8px; font-weight: 600; font-size: 0.875rem;
      cursor: pointer; color: var(--muted); transition: all .15s;
      background: #fff;
    }
    .room-chip:hover { border-color: var(--primary); color: var(--primary); }
    .room-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    .range-inputs { display: flex; gap: 8px; align-items: center; }
    .range-input {
      width: 130px; height: 36px; padding: 0 10px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: 0.875rem; color: var(--text); background: #fff;
      outline: none; transition: border-color .15s;
    }
    .range-input:focus { border-color: var(--primary); }
    .range-sep { color: var(--muted); font-size: 0.85rem; }

    .hot-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .form-check-input:checked { background-color: var(--hot); border-color: var(--hot); }

    .map-pick-btn {
      height: 36px; padding: 0 14px; border: 1.5px solid var(--border); border-radius: 8px;
      background: #fff; font-size: 0.85rem; font-weight: 500; color: var(--muted);
      cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .15s;
      white-space: nowrap;
    }
    .map-pick-btn:hover { border-color: var(--primary); color: var(--primary); }
    .map-pick-btn.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    /* ── Sort / Results header ── */
    .results-header { padding: 1rem 1.5rem 0.5rem; display: flex; align-items: center; justify-content: space-between; }
    .results-count { font-size: 0.9rem; color: var(--muted); }
    .results-count strong { color: var(--text); font-weight: 700; }
    .sort-select {
      height: 34px; padding: 0 10px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; color: var(--text); background: #fff; cursor: pointer; outline: none;
    }

    /* ── Cards grid ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 0 1.5rem 2rem; }

    .listing-card {
      background: #fff; border-radius: var(--radius); border: 1px solid var(--border);
      overflow: hidden; cursor: pointer; transition: box-shadow .2s, transform .2s;
    }
    .listing-card:hover { box-shadow: 0 8px 30px rgba(0,0,0,.09); transform: translateY(-2px); }
    .listing-card.hot { border-color: #FCA5A5; }

    .card-photo {
      height: 160px; background: linear-gradient(135deg, #E2E8F0 0%, #CBD5E1 100%);
      position: relative; display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-photo .photo-icon { color: #94A3B8; font-size: 2.5rem; }
    .card-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hot-badge {
      position: absolute; top: 10px; left: 10px;
      background: var(--hot); color: #fff; font-size: 0.72rem; font-weight: 700;
      padding: 4px 9px; border-radius: 20px; letter-spacing: 0.02em;
    }
    .rooms-badge {
      position: absolute; top: 10px; right: 10px;
      background: rgba(255,255,255,.92); color: var(--text); font-size: 0.8rem; font-weight: 600;
      padding: 3px 9px; border-radius: 20px;
    }

    .card-body { padding: 14px 16px; }
    .card-address { font-size: 0.82rem; color: var(--muted); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-title { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .card-meta { font-size: 0.8rem; color: var(--muted); display: flex; gap: 10px; margin-bottom: 10px; }
    .card-meta span { display: flex; align-items: center; gap: 3px; }
    .card-price { font-size: 1.15rem; font-weight: 800; color: var(--text); }
    .card-ppm2 { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .card-discount { font-size: 0.78rem; color: var(--hot); font-weight: 600; margin-top: 3px; }

    /* ── Pagination ── */
    .pagination-wrap { display: flex; justify-content: center; align-items: center; gap: 12px; padding: 0.5rem 1.5rem 2rem; }
    .page-btn {
      height: 36px; padding: 0 18px; border: 1.5px solid var(--border); border-radius: 8px;
      background: #fff; font-size: 0.875rem; font-weight: 600; color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .page-btn:disabled { opacity: .4; cursor: default; }
    .page-info { font-size: 0.875rem; color: var(--muted); white-space: nowrap; }

    /* ── Modal ── */
    .modal-content { border-radius: 16px; border: none; box-shadow: 0 25px 60px rgba(0,0,0,.18); }
    .modal-header { border-bottom: 1px solid var(--border); padding: 1.25rem 1.5rem; }
    .modal-title { font-weight: 800; font-size: 1.15rem; }
    .modal-body { padding: 1.5rem; }

    .detail-photo { height: 220px; background: linear-gradient(135deg, #E2E8F0, #CBD5E1); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.25rem; overflow: hidden; position: relative; }
    .detail-photo img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .gallery-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.85); border: none; border-radius: 50%;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1rem; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.15);
      transition: background .15s;
    }
    .gallery-nav:hover { background: #fff; }
    .gallery-nav.prev { left: 10px; }
    .gallery-nav.next { right: 10px; }
    .gallery-counter {
      position: absolute; bottom: 8px; right: 10px;
      background: rgba(0,0,0,.45); color: #fff; font-size: .72rem; font-weight: 600;
      padding: 2px 8px; border-radius: 20px;
    }
    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .stat-box { background: var(--surface); border-radius: 8px; padding: 12px 14px; }
    .stat-box .label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 3px; }
    .stat-box .value { font-size: 1rem; font-weight: 700; color: var(--text); }

    .compare-bar { background: var(--surface); border-radius: 10px; padding: 14px 16px; margin-bottom: 1rem; }
    .compare-bar .label { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
    .compare-bar .track { height: 6px; background: #E2E8F0; border-radius: 3px; position: relative; }
    .compare-bar .fill { height: 100%; background: var(--success); border-radius: 3px; }
    .compare-bar .caption { font-size: 0.8rem; font-weight: 600; color: var(--success); margin-top: 6px; }

    .modal-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-primary-custom {
      flex: 1; min-width: 140px; height: 40px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-weight: 600; font-size: 0.875rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity .15s;
    }
    .btn-primary-custom:hover { opacity: .88; }
    .btn-outline-custom {
      flex: 1; min-width: 140px; height: 40px; background: #fff; color: var(--primary);
      border: 1.5px solid var(--primary); border-radius: 8px; font-weight: 600; font-size: 0.875rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: all .15s;
    }
    .btn-outline-custom:hover { background: var(--primary-light); }

    /* ── Toast ── */
    .domq-toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; }
    .domq-toast {
      background: #1e293b; color: #fff; padding: 12px 18px; border-radius: 10px;
      font-size: 0.875rem; font-weight: 500; box-shadow: 0 4px 20px rgba(0,0,0,.25);
      animation: toastIn .25s ease; max-width: 320px;
    }
    .domq-toast.error { background: #dc2626; }
    .domq-toast.warn  { background: #d97706; }
    @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar d-flex align-items-center justify-content-between">
  <div class="d-flex align-items-center gap-4">
    <a class="navbar-brand" href="index.html">Dom<span>Q</span></a>
    <div class="d-flex gap-1">
      <a class="nav-link active" href="index.html"><i class="bi bi-search me-1"></i>Поиск</a>
      <a class="nav-link" href="map.html"><i class="bi bi-map me-1"></i>Карта рынка</a>
      <a class="nav-link" href="estimate.html"><i class="bi bi-calculator me-1"></i>Оценить квартиру</a>
    </div>
  </div>
  <div class="last-update"><i class="bi bi-clock me-1"></i>DomQ</div>
</nav>

<!-- ── Filters ── -->
<div class="filters-bar">
  <div class="d-flex flex-wrap align-items-end gap-4">

    <!-- Rooms -->
    <div>
      <div class="filter-label">Комнатность</div>
      <div class="room-chips" id="roomChips">
        <div class="room-chip" data-rooms="0" style="width:auto;padding:0 10px;font-size:0.8rem">Ст</div>
        <div class="room-chip" data-rooms="1">1</div>
        <div class="room-chip" data-rooms="2">2</div>
        <div class="room-chip" data-rooms="3">3</div>
        <div class="room-chip" data-rooms="4">4</div>
        <div class="room-chip" data-rooms="5">5</div>
        <div class="room-chip" data-rooms="6">6</div>
      </div>
    </div>

    <!-- Price -->
    <div>
      <div class="filter-label">Цена, руб.</div>
      <div class="range-inputs">
        <input class="range-input" id="minPrice" type="text" placeholder="от 3 000 000" />
        <span class="range-sep">—</span>
        <input class="range-input" id="maxPrice" type="text" placeholder="до 30 000 000" />
      </div>
    </div>

    <!-- Area -->
    <div>
      <div class="filter-label">Площадь, м²</div>
      <div class="range-inputs">
        <input class="range-input" id="minArea" type="text" placeholder="от 20" style="width:100px" />
        <span class="range-sep">—</span>
        <input class="range-input" id="maxArea" type="text" placeholder="до 200" style="width:100px" />
      </div>
    </div>

    <!-- Hot deals -->
    <div>
      <div class="filter-label">Горячие сделки</div>
      <label class="hot-toggle">
        <input class="form-check-input" id="hotDealsToggle" type="checkbox" role="switch" style="width:42px;height:22px;cursor:pointer" />
        <span style="font-size:.85rem;font-weight:600;color:var(--hot)"><i class="bi bi-fire"></i> Только выгодные</span>
      </label>
    </div>

    <!-- District picker -->
    <div>
      <div class="filter-label">Район</div>
      <button class="map-pick-btn" id="mapPickBtn">
        <i class="bi bi-hexagon"></i> <span id="mapPickLabel">Выбрать на карте</span>
      </button>
    </div>

  </div>
</div>

<!-- ── Results header ── -->
<div class="results-header">
  <div class="results-count" id="resultsCount">Загрузка...</div>
  <div class="d-flex align-items-center gap-3">
    <span style="font-size:.85rem;color:var(--muted)">Сортировка:</span>
    <select class="sort-select" id="sortSelect">
      <option value="discount">По скидке от рынка ↓</option>
      <option value="price_asc">По цене ↑</option>
      <option value="price_desc">По цене ↓</option>
      <option value="ppm2_asc">По цене/м² ↑</option>
      <option value="ppm2_desc">По цене/м² ↓</option>
    </select>
  </div>
</div>

<!-- ── Cards ── -->
<div class="cards-grid" id="cardsGrid"></div>

<!-- ── Pagination ── -->
<div class="pagination-wrap" id="paginationWrap" style="display:none">
  <button class="page-btn" id="prevBtn">← Предыдущая</button>
  <span class="page-info" id="pageInfo">Страница 1 из 1</span>
  <button class="page-btn" id="nextBtn">Следующая →</button>
</div>

<!-- ── Detail Modal ── -->
<div id="detailModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;padding:1rem">
  <div style="background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.2)">
    <div id="modalHeader" style="padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <div>
        <div id="modalMeta" style="font-size:.8rem;color:var(--muted)"></div>
        <div id="modalTitle" style="font-weight:800;font-size:1.1rem;margin-top:2px"></div>
      </div>
      <button onclick="document.getElementById('detailModal').style.display='none'" style="background:none;border:none;font-size:1.4rem;color:var(--muted);cursor:pointer;line-height:1">&times;</button>
    </div>
    <div id="modalBody" style="padding:1.5rem"></div>
  </div>
</div>

<!-- ── Toast container ── -->
<div class="domq-toast-wrap" id="toastWrap"></div>

<script type="module">
import { getListings, getListing } from './api.js';
import { fmtRub, fmtPpm2, fmtArea, fmtDate, getParam, showToast } from './utils.js';

const PAGE_SIZE = 20;

// ── State ──
const state = {
  rooms: new Set(),
  minPrice: null,
  maxPrice: null,
  minArea: null,
  maxArea: null,
  isHotDeal: null,
  h3_index: null,
  building_id: null,
  page: 1,
  total: 0,
  sortBy: 'discount_percent',
  sortOrder: 'desc',
};

// ── Helpers ──
function parseNum(str) {
  if (!str) return null;
  const n = parseFloat(str.replace(/\s/g, '').replace(',', '.'));
  return isNaN(n) ? null : n;
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}


// ── Card HTML ──
function buildCardHTML(item) {
  const isHot = item.is_hot_deal;
  const disc = item.discount_percent ? Math.round(item.discount_percent) : 0;
  const hotBadge = isHot && disc
    ? `<span class="hot-badge"><i class="bi bi-fire"></i> −${disc}% от рынка</span>` : '';
  const roomsBadge = item.rooms != null
    ? `<span class="rooms-badge">${item.rooms === 0 ? 'Студия' : item.rooms + '-комн.'}</span>` : '';
  const discountLine = isHot && disc
    ? `<div class="card-discount"><i class="bi bi-fire"></i> На ${disc}% ниже медианы района</div>` : '';
  const photoContent = item.thumbnail_url
    ? `<img src="${item.thumbnail_url}" alt="фото" loading="lazy" />`
    : `<i class="bi bi-building photo-icon"></i>`;
  return `
    <div class="listing-card${isHot ? ' hot' : ''}" data-id="${item.id}">
      <div class="card-photo">
        ${photoContent}
        ${hotBadge}${roomsBadge}
      </div>
      <div class="card-body">
        <div class="card-address"><i class="bi bi-geo-alt"></i> ${item.address ?? '—'}</div>
        <div class="card-title">${fmtRub(item.price)}</div>
        <div class="card-meta">
          <span><i class="bi bi-aspect-ratio"></i> ${fmtArea(item.area_total)}</span>
          <span><i class="bi bi-layers"></i> ${item.floor ?? '?'} / ${item.floors_total ?? '?'} эт.</span>
        </div>
        <div class="card-ppm2">${fmtPpm2(item.price_per_m2)}</div>
        ${discountLine}
      </div>
    </div>`;
}

// ── Render cards ──
function renderCards(items) {
  const grid = document.getElementById('cardsGrid');
  if (items.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)"><i class="bi bi-search" style="font-size:2rem;display:block;margin-bottom:12px"></i>Объявлений не найдено</div>';
    return;
  }
  grid.innerHTML = items.map(buildCardHTML).join('');
  grid.querySelectorAll('.listing-card').forEach(card => {
    card.addEventListener('click', () => openModal(parseInt(card.dataset.id)));
  });
}

function showLoading() {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Загрузка...</span></div></div>';
}

function updateResultsCount() {
  const el = document.getElementById('resultsCount');
  el.innerHTML = `Найдено <strong>${state.total.toLocaleString('ru')}</strong> объявлений`;
}

function updatePagination() {
  const totalPages = Math.max(1, Math.ceil(state.total / PAGE_SIZE));
  const wrap = document.getElementById('paginationWrap');
  wrap.style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('pageInfo').textContent = `Страница ${state.page} из ${totalPages}`;
  document.getElementById('prevBtn').disabled = state.page <= 1;
  document.getElementById('nextBtn').disabled = state.page >= totalPages;
}

// ── Fetch ──
async function fetchAndRender(reset = true) {
  if (reset) { state.page = 1; }
  showLoading();

  const filters = {
    limit: PAGE_SIZE,
    offset: (state.page - 1) * PAGE_SIZE,
    is_active: true,
    sort_by: state.sortBy,
    sort_order: state.sortOrder,
  };
  if (state.rooms.size > 0)   filters.rooms = [...state.rooms];
  if (state.minPrice != null) filters.min_price = state.minPrice;
  if (state.maxPrice != null) filters.max_price = state.maxPrice;
  if (state.minArea != null)  filters.min_area = state.minArea;
  if (state.maxArea != null)  filters.max_area = state.maxArea;
  if (state.isHotDeal)        filters.is_hot_deal = true;
  if (state.h3_index)         filters.h3_index = state.h3_index;
  if (state.building_id != null) filters.building_id = state.building_id;

  try {
    const result = await getListings(filters);
    state.total = result.total;
    renderCards(result.items);
    updateResultsCount();
    updatePagination();
  } catch (e) {
    showToast('Ошибка загрузки: ' + e.message, 'error');
    document.getElementById('cardsGrid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">Не удалось загрузить объявления</div>';
    document.getElementById('resultsCount').textContent = '';
  }
}

// ── Modal ──
async function openModal(id) {
  const modal = document.getElementById('detailModal');
  modal.style.display = 'flex';
  document.getElementById('modalMeta').textContent = `ID: ${id} · Cian.ru`;
  document.getElementById('modalTitle').textContent = 'Загрузка...';
  document.getElementById('modalBody').innerHTML =
    '<div style="text-align:center;padding:2rem"><div class="domq-spinner"></div></div>';

  try {
    const item = await getListing(id);
    renderModal(item);
  } catch (e) {
    showToast('Не удалось загрузить объявление', 'error');
    modal.style.display = 'none';
  }
}

function renderModal(item) {
  const isHot = item.is_hot_deal;
  const disc = item.discount_percent ? Math.round(item.discount_percent) : 0;

  document.getElementById('modalMeta').innerHTML =
    `ID: ${item.external_id ?? item.id}`;
  const roomLabel = item.rooms === 0 ? 'Студия' : `${item.rooms ?? '?'}-комн. квартира`;
  document.getElementById('modalTitle').textContent =
    `${roomLabel}, ${fmtArea(item.area_total)}`;

  const hotBadge = isHot && disc
    ? `<span style="background:var(--hot-light);color:var(--hot);font-weight:700;font-size:.82rem;padding:4px 10px;border-radius:20px"><i class="bi bi-fire"></i> −${disc}% от рынка</span>`
    : '';

  const pct = isHot && disc ? Math.round(100 - disc) : 50;
  const modalRoomLabel = item.rooms === 0 ? 'Студия' : `${item.rooms ?? '?'}-комн.`;
  const compareBar = isHot && disc ? `
    <div class="compare-bar">
      <div class="label">Сравнение с медианой микрорайона (${modalRoomLabel})</div>
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
      <div class="caption"><i class="bi bi-arrow-down-circle-fill"></i> На ${disc}% ниже среднего — выгодная покупка</div>
    </div>` : '';

  const SOURCE_META = {
    cian:  { label: 'Cian.ru',  fallback: id => `https://cian.ru/sale/flat/${id}/` },
    avito: { label: 'Avito',    fallback: id => `https://www.avito.ru/item/${id}` },
  };
  const activeSources = (item.sources && item.sources.length > 0)
    ? item.sources
    : [{ source: item.source || 'cian', url: item.url, external_id: item.external_id, price: item.price }];
  const multiSource = activeSources.length > 1;
  const sourceButtonsHTML = activeSources.map(s => {
    const meta = SOURCE_META[s.source] ?? { label: s.source, fallback: () => '#' };
    const url = s.url || meta.fallback(s.external_id);
    const priceLabel = multiSource && s.price != null ? ` · ${fmtRub(s.price)}` : '';
    return `<a href="${url}" target="_blank" class="btn-primary-custom" style="text-decoration:none">
      <i class="bi bi-box-arrow-up-right"></i> ${meta.label}${priceLabel}
    </a>`;
  }).join('');

  const mapUrl = (() => {
    const p = new URLSearchParams();
    if (item.h3_index) p.set('h3', item.h3_index);
    if (item.latitude)  p.set('lat', item.latitude);
    if (item.longitude) p.set('lng', item.longitude);
    return 'map.html?' + p.toString();
  })();

  const photos = item.photos && item.photos.length > 0 ? item.photos : null;
  const detailPhotoHTML = photos
    ? `<img id="galleryImg" src="${photos[0]}" alt="фото" />
       ${photos.length > 1 ? `
         <button class="gallery-nav prev" id="galleryPrev"><i class="bi bi-chevron-left"></i></button>
         <button class="gallery-nav next" id="galleryNext"><i class="bi bi-chevron-right"></i></button>
         <span class="gallery-counter" id="galleryCounter">1 / ${photos.length}</span>` : ''}`
    : `<i class="bi bi-image" style="font-size:3rem;color:#CBD5E1"></i>`;

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-photo" id="detailPhoto">
      ${detailPhotoHTML}
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-size:1.6rem;font-weight:900;color:var(--text)">${fmtRub(item.price)}</span>
      ${hotBadge}
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="label">Площадь</div><div class="value">${fmtArea(item.area_total)}</div></div>
      <div class="stat-box"><div class="label">Цена / м²</div><div class="value">${fmtPpm2(item.price_per_m2)}</div></div>
      <div class="stat-box"><div class="label">Этаж</div><div class="value">${item.floor ?? '?'} из ${item.floors_total ?? '?'}</div></div>
      <div class="stat-box"><div class="label">Комнатность</div><div class="value">${item.rooms ?? '?'}-комнатная</div></div>
    </div>
    <div style="font-size:.85rem;color:var(--muted);margin-bottom:14px;display:flex;align-items:flex-start;gap:6px">
      <i class="bi bi-geo-alt-fill" style="color:var(--primary);margin-top:2px"></i>
      ${item.address ?? '—'}
    </div>
    ${compareBar}
    <div style="background:var(--surface);border-radius:10px;padding:14px 16px;margin-bottom:1rem;font-size:.85rem;color:var(--muted)">
      <i class="bi bi-calendar3 me-1"></i>
      На площадке с <strong style="color:var(--text)">${fmtDate(item.first_seen_at)}</strong>
      · Последнее изменение: <strong style="color:var(--text)">${fmtDate(item.last_seen_at)}</strong>
    </div>
    <div class="modal-actions">
      ${sourceButtonsHTML}
      <a href="${mapUrl}" class="btn-outline-custom" style="text-decoration:none">
        <i class="bi bi-map"></i> Показать на карте
      </a>
    </div>`;

  if (photos && photos.length > 1) {
    let idx = 0;
    const img = document.getElementById('galleryImg');
    const counter = document.getElementById('galleryCounter');
    function showPhoto(i) {
      idx = (i + photos.length) % photos.length;
      img.src = photos[idx];
      counter.textContent = `${idx + 1} / ${photos.length}`;
    }
    document.getElementById('galleryPrev').addEventListener('click', () => showPhoto(idx - 1));
    document.getElementById('galleryNext').addEventListener('click', () => showPhoto(idx + 1));
  }
}

// ── Wire up filters ──

// Room chips — multi-select toggle
document.querySelectorAll('#roomChips .room-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const val = parseInt(chip.dataset.rooms);
    if (state.rooms.has(val)) {
      state.rooms.delete(val);
      chip.classList.remove('active');
    } else {
      state.rooms.add(val);
      chip.classList.add('active');
    }
    fetchAndRender(true);
  });
});

// Price/area inputs — debounced
const debouncedFetch = debounce(() => fetchAndRender(true), 500);
document.getElementById('minPrice').addEventListener('input', e => {
  state.minPrice = parseNum(e.target.value);
  debouncedFetch();
});
document.getElementById('maxPrice').addEventListener('input', e => {
  state.maxPrice = parseNum(e.target.value);
  debouncedFetch();
});
document.getElementById('minArea').addEventListener('input', e => {
  state.minArea = parseNum(e.target.value);
  debouncedFetch();
});
document.getElementById('maxArea').addEventListener('input', e => {
  state.maxArea = parseNum(e.target.value);
  debouncedFetch();
});

// Hot deals toggle
document.getElementById('hotDealsToggle').addEventListener('change', e => {
  state.isHotDeal = e.target.checked || null;
  fetchAndRender(true);
});

// Sort select — triggers server-side re-fetch
document.getElementById('sortSelect').addEventListener('change', e => {
  const map = {
    'discount':   ['discount_percent', 'desc'],
    'price_asc':  ['price', 'asc'],
    'price_desc': ['price', 'desc'],
    'ppm2_asc':   ['price_per_m2', 'asc'],
    'ppm2_desc':  ['price_per_m2', 'desc'],
  };
  [state.sortBy, state.sortOrder] = map[e.target.value] ?? ['discount_percent', 'desc'];
  fetchAndRender(true);
});

// Pagination
document.getElementById('prevBtn').addEventListener('click', () => { state.page--; fetchAndRender(false); });
document.getElementById('nextBtn').addEventListener('click', () => { state.page++; fetchAndRender(false); });

// Close modal on backdrop click
document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === document.getElementById('detailModal'))
    document.getElementById('detailModal').style.display = 'none';
});

// Map pick button — navigate to map or clear filter
document.getElementById('mapPickBtn').addEventListener('click', () => {
  if (state.h3_index || state.building_id != null) {
    state.h3_index = null;
    state.building_id = null;
    document.getElementById('mapPickLabel').textContent = 'Выбрать на карте';
    document.getElementById('mapPickBtn').classList.remove('active');
    fetchAndRender(true);
  } else {
    window.location.href = 'map.html';
  }
});

// ── Init: read h3 / building_id from URL ──
const h3FromUrl = getParam('h3');
if (h3FromUrl) {
  state.h3_index = h3FromUrl;
  document.getElementById('mapPickLabel').textContent = h3FromUrl.slice(0, 10) + '…';
  document.getElementById('mapPickBtn').classList.add('active');
}

const buildingIdFromUrl = getParam('building_id');
if (buildingIdFromUrl) {
  state.building_id = parseInt(buildingIdFromUrl);
  document.getElementById('mapPickLabel').textContent = 'Конкретное здание';
  document.getElementById('mapPickBtn').classList.add('active');
}

fetchAndRender(true);
</script>
</body>
</html>
